<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Konrad Parada Photos</title>
    <meta
      name="description"
      content="A minimalist photography portfolio with album selection, scroll-based text reveals, and an about section."
    />
    <link rel="icon" type="image/jpeg" href="/assets/favicon.jpg" />
    <link rel="modulepreload" href="/script/main.js" />
    <link rel="modulepreload" href="/script/home.js" />
    <link rel="prefetch" href="/data/homepage.settings.json" as="fetch" crossorigin="anonymous" />
    <script>
      if (new URLSearchParams(window.location.search).has("home")) {
        document.documentElement.classList.add("skip-splash");
      }
    </script>
    <style>
      body.home-page.splash-page.has-active-splash {
        margin: 0;
        background: #060606;
        color: #ffffff;
        overflow: hidden;
      }

      body.home-page.splash-page.has-active-splash .splash-shell {
        position: fixed;
        inset: 0;
        z-index: 2000;
        min-height: 100vh;
        background: #060606;
        color: #ffffff;
      }

      body.home-page.splash-page.has-active-splash .splash-backdrop,
      body.home-page.splash-page.has-active-splash .splash-overlay,
      body.home-page.splash-page.has-active-splash .splash-center,
      body.home-page.splash-page.has-active-splash .splash-prompt {
        position: absolute;
        inset: 0;
      }

      body.home-page.splash-page.has-active-splash .splash-backdrop {
        background-position: center center;
        background-repeat: no-repeat;
        background-size: cover;
      }

      body.home-page.splash-page.has-active-splash .splash-center {
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      body.home-page.splash-page.has-active-splash .splash-title {
        color: #ffffff;
        font-family: sans-serif;
        font-size: clamp(2.5rem, 6vw, 5.5rem);
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .skip-splash body.home-page.splash-page.has-active-splash {
        background: #fcfbf8;
        color: #111111;
        overflow-x: hidden;
        overflow-y: auto;
      }

      .skip-splash body.home-page.splash-page.has-active-splash .splash-shell {
        opacity: 0;
        pointer-events: none;
        visibility: hidden;
      }

      body.home-page:not(.is-ready) .masthead,
      body.home-page:not(.is-ready) .albums-section {
        opacity: 0;
      }
    </style>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body
    class="home-page splash-page has-active-splash is-ready"
    data-homepage-settings="/data/homepage.settings.json"
    data-site-brand="Konrad Parada Photos"
  >
    <main class="splash-shell" data-splash-shell>
      <div
        class="splash-backdrop"
        aria-hidden="true"
        style="background-image: url('/assets/splash/hero.png');"
      ></div>
      <div class="splash-overlay" aria-hidden="true"></div>

      <div class="splash-center">
        <a class="splash-title-link" href="#top" data-splash-enter>
          <span class="splash-title">KONRAD PARADA</span>
        </a>
      </div>

      <div class="splash-prompt" aria-hidden="true">
        <span>Scroll to enter</span>
      </div>
    </main>

    <div class="mobile-menu-drawer" id="mobile-menu-drawer" aria-hidden="true">
      <div class="mobile-menu-panel">
        <button class="mobile-menu-close" type="button" aria-label="Close menu">Close</button>
        <div class="mobile-menu-section">
          <p class="rail-label">Index</p>
          <nav class="rail-nav" aria-label="Mobile primary">
            <a href="#albums">Albums</a>
            <a href="#contact">Contact</a>
          </nav>
        </div>
      </div>
    </div>
    <div class="site-frame">
      <aside class="identity-rail">
        <div class="rail-block">
          <a class="brand" href="#top" data-site-brand-target>Konrad Parada Photos</a>
        </div>

        <div class="rail-block rail-block-nav">
          <p class="rail-label">Index</p>
          <nav class="rail-nav" aria-label="Primary">
            <a href="#albums">Albums</a>
            <a href="#contact">Contact</a>
          </nav>
        </div>
      </aside>

      <main class="content-column" id="top">
        <div class="mobile-brand-wrap">
          <a class="brand mobile-brand" href="#top" data-site-brand-target>Konrad Parada Photos</a>
        </div>
        <section class="masthead section">
          <div class="masthead-copy">
            <h1 class="masthead-title reveal-words homepage-quote">
              “What is the purpose of life?...To be the eyes and ears and conscience of the Creator of the Universe, you fool!”
            </h1>
            <p class="masthead-attribution reveal-up homepage-quote-attribution">- Kurt Vonnegut</p>
          </div>
        </section>

        <section class="section albums-section" id="albums">
          <div class="album-list reveal-up" aria-label="Album category navigation">
            <button class="album-link is-active" type="button" data-filter="all">All</button>
            <button class="album-link" type="button" data-filter="street-photography">Street Photography</button>
            <button class="album-link" type="button" data-filter="events">Events</button>
            <button class="album-link" type="button" data-filter="artistic">Artistic</button>
            <button class="album-link" type="button" data-filter="portraits">Portraits</button>
          </div>

          <div class="album-grid" aria-live="polite"></div>
        </section>

        <section class="section spacer-section" aria-hidden="true"></section>

        <footer class="section footer-section" id="contact">
          <div class="footer-grid">
            <p class="section-label reveal-up">Contact</p>
            <div class="footer-links">
              <a class="contact-link reveal-words" href="https://www.instagram.com/konradparada_photos/" target="_blank" rel="noreferrer">@konradparada_photos</a>
            </div>
          </div>
        </footer>
      </main>
    </div>

    <script type="module" src="/script/splash.js"></script>
    <script type="module" src="/script/main.js"></script>
  </body>
</html>
