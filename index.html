    <script>
      (function applyEarlyTheme() {
        try {
          var request = new XMLHttpRequest();
          request.open("GET", "/data/homepage.settings.json", false);
          request.send(null);
          if (request.status >= 200 && request.status < 300) {
            var settings = JSON.parse(request.responseText);
            if (settings && settings.darkMode === true) {
              document.documentElement.classList.add("is-site-dark-root");
            }
          }
        } catch (error) {
          document.documentElement.classList.add("is-site-dark-root");
        }
      })();

      if (new URLSearchParams(window.location.search).has("home")) {
        document.documentElement.classList.add("skip-splash");
      } else {
        document.documentElement.classList.add("has-active-splash-root");
      }

      (function applyEarlySplashSettings() {
        var splashImages = [
          "/assets/splash/hero.png",
          "/assets/splash/DSC05857_copy-d0fe7bc7-2500.jpg",
          "/assets/splash/IMG_8893_DxO_copy-b2c0bb74-2500.jpg",
          "/assets/splash/IMG_0821-34f437b6-2500.jpg",
          "/assets/splash/IMG_0524-2_copy_Large_1-3544b26c-2500.jpg"
        ];
        var focalPoints = {
          "/assets/splash/IMG_0524-2_copy_Large_1-3544b26c-2500.jpg": {
            mobile: "right center"
          }
        };
        var fontOptions = {
          inter: '"Inter", sans-serif',
          "moonbase-alpha": '"MoonbaseAlpha", sans-serif',
          ledlight: '"Ledlight", sans-serif',
          saint: '"Saint", serif',
          "young-serif": '"YoungSerif", serif',
          clash: '"ClashDisplay", sans-serif',
          "neue-haas": '"NeueHaasDisplay", sans-serif',
          manrope: '"Manrope", sans-serif',
          "space-grotesk": '"SpaceGrotesk", sans-serif',
          "plus-jakarta-sans": '"PlusJakartaSans", sans-serif',
          sora: '"Sora", sans-serif',
          "instrument-serif": '"InstrumentSerif", serif',
          "cormorant-garamond": '"CormorantGaramond", serif',
          fraunces: '"Fraunces", serif',
          newsreader: '"Newsreader", serif',
          "libre-baskerville": '"LibreBaskerville", serif',
          syne: '"Syne", sans-serif',
          picnic: '"PicNic", serif'
        };
        var settings = {};

        try {
          var request = new XMLHttpRequest();
          request.open("GET", "/data/homepage.settings.json", false);
          request.send(null);
          if (request.status >= 200 && request.status < 300) {
            var homepageSettings = JSON.parse(request.responseText);
            settings = homepageSettings && typeof homepageSettings.splashSettings === "object" ? homepageSettings.splashSettings : {};
          }
        } catch (error) {
          settings = {};
        }

        if (!Object.keys(settings).length) {
          try {
            var stored = JSON.parse(window.localStorage.getItem("konradSplashTimingSettings") || "null");
            if (stored && typeof stored === "object") {
              settings = stored;
            }
          } catch (error) {
            settings = {};
          }
        }

        var titleFontFamily = Object.prototype.hasOwnProperty.call(fontOptions, settings.titleFontFamily) ? settings.titleFontFamily : "saint";
        var letterSpacing = Number.isFinite(Number(settings.titleLetterSpacing)) ? Math.min(0.5, Math.max(0, Number(settings.titleLetterSpacing))) : 0.16;
        var imageIndex = Math.floor(Math.random() * splashImages.length);
        var imageUrl = splashImages[imageIndex] || splashImages[0];
        var focalPoint = focalPoints[imageUrl] || {};
        window.__KONRAD_SPLASH_INITIAL_IMAGE_INDEX__ = imageIndex;
        window.__KONRAD_SPLASH_EARLY_SETTINGS__ = settings;
        document.documentElement.style.setProperty("--splash-title-font-family", fontOptions[titleFontFamily]);
        document.documentElement.style.setProperty("--splash-title-letter-spacing", letterSpacing.toFixed(3) + "em");
        document.documentElement.style.setProperty("--splash-initial-image", "url('" + imageUrl + "')");
        document.documentElement.style.setProperty("--splash-image-position", focalPoint.default || "center center");
        document.documentElement.style.setProperty("--splash-image-position-mobile", focalPoint.mobile || focalPoint.default || "center center");
      })();
    </script>

      html.has-active-splash-root {
        background: #0d0d0d;
        overflow: hidden;

      body.home-page.splash-page.has-active-splash {
        margin: 0;
        background: #0d0d0d;
        color: var(--text, #111111);
        overflow: hidden;
      }

      body.home-page.splash-page.has-active-splash .splash-shell {
        --splash-title-size: clamp(2.5rem, 6vw, 5.5rem);
        --splash-title-effective-letter-spacing: var(--splash-title-letter-spacing, 0.16em);
        position: fixed;
        inset: 0;
        z-index: 2000;
        width: 100vw;
        height: 100vh;
        height: 100svh;
        height: 100dvh;
        min-height: 100vh;
        min-height: 100svh;
        min-height: 100dvh;
        background: #0d0d0d;
        color: #ffffff;
        opacity: 1;
        transition:
          opacity var(--splash-fade-duration, 1000ms) cubic-bezier(var(--splash-ease-x1, 0.85), var(--splash-ease-y1, 0), var(--splash-ease-x2, 0.15), var(--splash-ease-y2, 1)),
          visibility var(--splash-fade-duration, 1000ms) cubic-bezier(var(--splash-ease-x1, 0.85), var(--splash-ease-y1, 0), var(--splash-ease-x2, 0.15), var(--splash-ease-y2, 1));
      }

      body.home-page.splash-page.has-entering-splash .splash-shell {
        opacity: 0;
      }

      body.home-page.splash-page.has-entered-splash .splash-shell {
        opacity: 0;
      }

      body.home-page.splash-page.has-active-splash .splash-backdrop,
      body.home-page.splash-page.has-active-splash .splash-overlay,
      body.home-page.splash-page.has-active-splash .splash-center,
      body.home-page.splash-page.has-active-splash .splash-prompt {
        position: absolute;
        inset: 0;
        min-height: 100vh;
        min-height: 100svh;
        min-height: 100dvh;
      }

      body.home-page.splash-page.has-active-splash .splash-backdrop {
        background-position: var(--splash-image-position, center center);
        background-repeat: no-repeat;
        background-size: cover;
        opacity: 0;
        transition: opacity var(--splash-image-fade-duration, 1200ms) ease;
      }

      body.home-page.splash-page.has-active-splash .splash-backdrop.is-active {
        opacity: 1;
      }

      body.home-page.splash-page.has-active-splash .splash-center {
