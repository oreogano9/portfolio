<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nina’s 50th: Vesuvio Edition</title>
    <meta
      name="description"
      content="Standalone photography album for Nina’s 50th: Vesuvio Edition."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body
    class="album-page"
    data-gallery-id="ninas-50th-vesuvio-edition"
    data-gallery-settings="./data/galleries/ninas-50th-vesuvio-edition.settings.json"
  >
    <button class="preview-toggle" type="button" id="album-preview-toggle" aria-pressed="false">Preview</button>
    <div class="site-frame">
      <main class="content-column" id="album-top">
        <section class="album-page-header section">
          <a class="album-back-link" href="./index.html">Home</a>
          <h1 class="masthead-title">Nina’s 50th: Vesuvio Edition</h1>
          <div class="subalbum-index is-hidden" aria-label="Sub-album navigation"></div>
        </section>

        <section class="section album-detail-section" id="album-grid">
          <div class="album-detail-grid"></div>
        </section>

        <section class="section mobile-home-section">
          <a class="mobile-home-button" href="./index.html">Home</a>
          <button class="mobile-home-button album-edit-button" type="button" id="album-edit-toggle">Edit</button>
          <button class="mobile-home-button album-save-button" type="button" id="album-save-json">Save</button>
          <button class="mobile-home-button album-export-button" type="button" id="album-export-json">Export JSON</button>
        </section>
      </main>
    </div>

    <div class="lightbox" id="lightbox" aria-hidden="true">
      <button class="lightbox-close" type="button" aria-label="Close image view">Close</button>
      <img class="lightbox-image" alt="" />
    </div>

    <script src="./script.js"></script>
  </body>
</html>
